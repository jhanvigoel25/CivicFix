<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>CivicFix | Community Issue Reporting</title>
  
  <!-- PWA manifest -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#1A56DB">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  
  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  
  <!-- Google Fonts & Main Stylesheet -->
  <link rel="stylesheet" href="style.css">
  
  <!-- Leaflet CSS Fallback -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.Default.css" />
</head>
<body>

  <!-- App Layout Wrapper -->
  <div class="app-layout">
    
    <!-- DESKTOP TOP NAV BAR -->
    <header class="desktop-header" id="desktop-top-nav">
      <div class="logo-section" onclick="Router.navigate('#/home')">
        <svg viewBox="0 0 512 512" class="header-logo-icon">
          <path d="M256,64 C160,64 80,144 80,240 C80,360 224,448 256,448 C288,448 432,360 432,240 C432,144 352,64 256,64 Z" fill="#1A56DB" />
          <circle cx="256" cy="240" r="100" fill="#FFFFFF" />
          <path d="M208,248 L238,278 L304,200" fill="none" stroke="#1A56DB" stroke-width="24" stroke-linecap="round" stroke-linejoin="round" />
        </svg>
        <span class="logo-text">CivicFix</span>
      </div>

      <nav class="desktop-nav-links">
        <a href="#/home" class="nav-link"><i data-lucide="home"></i> Home Feed</a>
        <a href="#/report" class="nav-link"><i data-lucide="plus-circle"></i> Report Issue</a>
        <a href="#/map" class="nav-link"><i data-lucide="map"></i> Interactive Map</a>
        <a href="#/leaderboard" class="nav-link"><i data-lucide="trophy"></i> Leaderboard</a>
        <a href="#/profile" class="nav-link"><i data-lucide="user"></i> Profile</a>
      </nav>

      <div class="desktop-actions">
        <!-- Notification bell -->
        <button class="icon-btn" id="notif-bell" title="Notifications">
          <i data-lucide="bell"></i>
          <span class="badge" id="notif-badge" style="display: none;">0</span>
        </button>
        <!-- Dynamic Login/Avatar container -->
        <div id="desktop-auth-btn">
          <button class="btn btn-outline" onclick="Router.navigate('#/login')">Authority Login</button>
        </div>
      </div>
    </header>

    <!-- MOBILE HEADER BAR -->
    <header class="mobile-header">
      <div class="logo-section" onclick="Router.navigate('#/home')">
        <svg viewBox="0 0 512 512" class="header-logo-icon">
          <path d="M256,64 C160,64 80,144 80,240 C80,360 224,448 256,448 C288,448 432,360 432,240 C432,144 352,64 256,64 Z" fill="#1A56DB" />
          <circle cx="256" cy="240" r="100" fill="#FFFFFF" />
          <path d="M208,248 L238,278 L304,200" fill="none" stroke="#1A56DB" stroke-width="24" stroke-linecap="round" stroke-linejoin="round" />
        </svg>
        <span class="logo-text">CivicFix</span>
      </div>
      <div class="mobile-actions" style="display: flex; align-items: center; gap: 12px;">
        <button class="icon-btn" id="notif-bell-mobile">
          <i data-lucide="bell"></i>
          <span class="badge" id="notif-badge-mobile" style="display: none;">0</span>
        </button>
        <div id="mobile-auth-btn"></div>
      </div>
    </header>

    <!-- SIDEBAR FOR AUTHORITY DASHBOARD PORTALS -->
    <aside class="sidebar-layout-aside" id="sidebar-nav" style="display: none;">
      <div class="sidebar-brand">
        <svg viewBox="0 0 512 512" width="28" height="28">
          <path d="M256,64 C160,64 80,144 80,240 C80,360 224,448 256,448 C288,448 432,360 432,240 C432,144 352,64 256,64 Z" fill="#FFFFFF" />
          <circle cx="256" cy="240" r="100" fill="#1A56DB" />
          <path d="M208,248 L238,278 L304,200" fill="none" stroke="#FFFFFF" stroke-width="24" stroke-linecap="round" stroke-linejoin="round" />
        </svg>
        <span>GovPortal</span>
      </div>
      <ul class="sidebar-links">
        <li><a href="#/dashboard" class="nav-link"><i data-lucide="layout-dashboard"></i> Overview</a></li>
        <li><a href="#/admin" class="nav-link" id="aside-admin-link"><i data-lucide="users"></i> Admin Panels</a></li>
        <li><a href="#/home" class="nav-link"><i data-lucide="eye"></i> Citizen View</a></li>
      </ul>
    </aside>

    <!-- MAIN APP ROUTED CONTENT CONTAINER -->
    <main class="app-content" id="main-content">
      <div class="loader-container">
        <div class="spinner"></div>
      </div>
    </main>

    <!-- MOBILE BOTTOM NAVIGATION BAR -->
    <nav class="mobile-nav-bar" id="mobile-bottom-nav">
      <a href="#/home" class="nav-item">
        <i data-lucide="home"></i>
        <span>Home</span>
      </a>
      <a href="#/report" class="nav-item">
        <i data-lucide="plus-circle"></i>
        <span>Report</span>
      </a>
      <a href="#/map" class="nav-item">
        <i data-lucide="map"></i>
        <span>Map</span>
      </a>
      <a href="#/leaderboard" class="nav-item">
        <i data-lucide="trophy"></i>
        <span>Leaderboard</span>
      </a>
      <a href="#/profile" class="nav-item">
        <i data-lucide="user"></i>
        <span>Profile</span>
      </a>
    </nav>
  </div>

  <!-- Notification Bell overlay list drawer -->
  <div class="notification-overlay-box card" id="notification-overlay">
    <div class="overlay-header">
      <h4>Notifications</h4>
    </div>
    <div class="notifications-list" id="notifications-list">
      <!-- Populated dynamically -->
    </div>
  </div>

  <!-- Toast alerts container -->
  <div class="toast-container" id="toast-container"></div>

  <!-- Define Google Maps failure callback before script load -->
  <script>
    window.googleMapsFailed = false;
    window.gm_authFailure = function() {
      console.warn("Google Maps authorization or key validation failed. Switching to Leaflet map fallback.");
      window.googleMapsFailed = true;
      window.dispatchEvent(new CustomEvent('google-maps-failed'));
    };
  </script>

  <!-- Leaflet JS Fallbacks -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet.heat@0.2.0/dist/leaflet-heat.js"></script>
  <script src="https://unpkg.com/leaflet.markercluster@1.4.1/dist/leaflet.markercluster.js"></script>

  <!-- Chart.js for operational dashboard charts -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <!-- jsPDF for transparent monthly report compilation -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <!-- Environment config — set GOOGLE_AI_STUDIO_KEY & GOOGLE_MAPS_KEY in env.js  -->
  <!-- On Vercel, env.js is auto-generated during build from project env vars.       -->
  <!-- If the file 404s (e.g. fresh clone without setup), __CIVICFIX_ENV__ stays      -->
  <!-- undefined and the app runs in simulation mode (no real keys exposed).          -->
  <script>window.__CIVICFIX_ENV__ = window.__CIVICFIX_ENV__ || {};</script>
  <script src="env.js" onerror="console.warn('env.js not found — running in simulation mode')"></script>

  <!-- APPLICATION CODE FILES -->
  <script src="js/config.js"></script>

  <!-- Google Maps JS SDK — loaded dynamically with key from CONFIG / env.js -->
  <script>
    (function() {
      var key = (window.CONFIG && window.CONFIG.GOOGLE_MAPS_KEY) || 'YOUR_GOOGLE_MAPS_KEY';
      if (key && key !== 'YOUR_GOOGLE_MAPS_KEY' && !key.startsWith('YOUR_')) {
        var s = document.createElement('script');
        s.src = 'https://maps.googleapis.com/maps/api/js?key=' + encodeURIComponent(key) + '&libraries=visualization';
        s.async = true;
        s.defer = true;
        document.head.appendChild(s);
      }
    })();
  </script>
  <script src="https://unpkg.com/@googlemaps/markerclusterer@2.5.3/dist/index.min.js"></script>

  <script src="js/db.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/ai.js"></script>
  <script src="js/router.js"></script>
  
  <!-- ROUTE CONTROLLERS -->
  <script src="js/pages/splash.js"></script>
  <script src="js/pages/login.js"></script>
  <script src="js/pages/signup.js"></script>
  <script src="js/pages/home.js"></script>
  <script src="js/pages/report.js"></script>
  <script src="js/pages/map.js"></script>
  <script src="js/pages/leaderboard.js"></script>
  <script src="js/pages/profile.js"></script>
  <script src="js/pages/dashboard.js"></script>
  <script src="js/pages/admin.js"></script>
  <script src="js/pages/public.js"></script>
  
  <!-- COORDINATOR ENTRYPOINT -->
  <script src="js/app.js"></script>
</body>
</html>
